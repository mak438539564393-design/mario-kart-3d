<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Mario Kart</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            font-weight: bold;
            z-index: 100;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 14px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div>Speed: <span id="speed">0</span> km/h</div>
        <div>Lap: <span id="lap">1</span></div>
    </div>
    <div id="instructions">
        <div><strong>Controls:</strong></div>
        <div>↑ / W : Forward</div>
        <div>↓ / S : Backward</div>
        <div>← / A : Turn Left</div>
        <div>→ / D : Turn Right</div>
        <div>SPACE : Brake</div>
    </div>

    <!-- Three.js library -->
    <script async src="https://cdn.jsdelivr.net/npm/three@r128/build/three.min.js"></script>
    
    <script>
        // Wait for Three.js to load
        function waitForThree(callback) {
            if (typeof THREE !== 'undefined') {
                callback();
            } else {
                setTimeout(() => waitForThree(callback), 100);
            }
        }

        waitForThree(() => {
            // Game variables
            const canvas = document.getElementById('gameCanvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });

            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFShadowShadowMap;

            // Scene setup
            scene.background = new THREE.Color(0x87CEEB); // Sky blue
            scene.fog = new THREE.Fog(0x87CEEB, 500, 1000);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(100, 100, 50);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            directionalLight.shadow.camera.left = -200;
            directionalLight.shadow.camera.right = 200;
            directionalLight.shadow.camera.top = 200;
            directionalLight.shadow.camera.bottom = -200;
            scene.add(directionalLight);

            // Player car
            const carGeometry = new THREE.BoxGeometry(1.5, 1, 3);
            const carMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            const car = new THREE.Mesh(carGeometry, carMaterial);
            car.castShadow = true;
            car.receiveShadow = true;
            car.position.y = 2;
            scene.add(car);

            // Wheels
            const wheelGeometry = new THREE.CylinderGeometry(0.5, 0.5, 0.6, 16);
            const wheelMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });

            const wheelPositions = [
                { x: -0.75, y: 0.5, z: 0.8 },
                { x: 0.75, y: 0.5, z: 0.8 },
                { x: -0.75, y: 0.5, z: -0.8 },
                { x: 0.75, y: 0.5, z: -0.8 }
            ];

            const wheels = [];
            wheelPositions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
                wheel.castShadow = true;
                wheel.receiveShadow = true;
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(pos.x, pos.y, pos.z);
                car.add(wheel);
                wheels.push(wheel);
            });

            // Player object
            const player = {
                position: new THREE.Vector3(0, 0, 0),
                velocity: new THREE.Vector3(0, 0, 0),
                rotation: 0,
                speed: 0,
                maxSpeed: 0.5,
                acceleration: 0.02,
                friction: 0.95,
                turnSpeed: 0.08,
                laps: 1,
                lastCheckpoint: 0,
                totalDistance: 0
            };

            // Track creation
            function createTrack() {
                const trackGroup = new THREE.Group();
                
                // Main track - circular with variations
                const trackPoints = [];
                const trackRadius = 80;
                const numPoints = 200;
                
                for (let i = 0; i <= numPoints; i++) {
                    const angle = (i / numPoints) * Math.PI * 2;
                    const radius = trackRadius + Math.sin(angle * 3) * 20;
                    const x = Math.cos(angle) * radius;
                    const z = Math.sin(angle) * radius;
                    trackPoints.push(new THREE.Vector3(x, 0, z));
                }
                
                // Ground
                const groundGeometry = new THREE.PlaneGeometry(500, 500);
                const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x228B22 });
                const ground = new THREE.Mesh(groundGeometry, groundMaterial);
                ground.receiveShadow = true;
                ground.rotation.x = -Math.PI / 2;
                trackGroup.add(ground);
                
                // Track surface
                const trackGeometry = new THREE.PlaneGeometry(40, 1000);
                const trackMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });
                
                for (let i = 0; i < trackPoints.length - 1; i++) {
                    const p1 = trackPoints[i];
                    const p2 = trackPoints[i + 1];
                    const track = new THREE.Mesh(trackGeometry, trackMaterial);
                    track.receiveShadow = true;
                    
                    const midX = (p1.x + p2.x) / 2;
                    const midZ = (p1.z + p2.z) / 2;
                    track.position.set(midX, 0.01, midZ);
                    
                    const angle = Math.atan2(p2.z - p1.z, p2.x - p1.x);
                    track.rotation.y = angle;
                    
                    trackGroup.add(track);
                }
                
                // Track markers
                for (let i = 0; i < trackPoints.length; i += 20) {
                    const marker = new THREE.Mesh(
                        new THREE.BoxGeometry(40, 0.5, 2),
                        new THREE.MeshStandardMaterial({ color: 0xffff00 })
                    );
                    marker.position.copy(trackPoints[i]);
                    marker.position.y = 0.1;
                    marker.receiveShadow = true;
                    trackGroup.add(marker);
                }
                
                // Finish line
                const finishLine = new THREE.Mesh(
                    new THREE.PlaneGeometry(50, 4),
                    new THREE.MeshStandardMaterial({ color: 0xffffff })
                );
                finishLine.position.set(trackPoints[0].x, 0.02, trackPoints[0].z);
                finishLine.rotation.x = -Math.PI / 2;
                finishLine.receiveShadow = true;
                trackGroup.add(finishLine);
                
                // Decorative elements - trees
                for (let i = 0; i < 30; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 120 + Math.random() * 50;
                    const x = Math.cos(angle) * radius;
                    const z = Math.sin(angle) * radius;
                    
                    // Tree trunk
                    const trunk = new THREE.Mesh(
                        new THREE.CylinderGeometry(2, 3, 20, 8),
                        new THREE.MeshStandardMaterial({ color: 0x8B4513 })
                    );
                    trunk.position.set(x, 10, z);
                    trunk.castShadow = true;
                    trunk.receiveShadow = true;
                    trackGroup.add(trunk);
                    
                    // Tree foliage
                    const foliage = new THREE.Mesh(
                        new THREE.SphereGeometry(15, 8, 8),
                        new THREE.MeshStandardMaterial({ color: 0x228B22 })
                    );
                    foliage.position.set(x, 30, z);
                    foliage.castShadow = true;
                    foliage.receiveShadow = true;
                    trackGroup.add(foliage);
                }
                
                return trackGroup;
            }

            const track = createTrack();
            scene.add(track);

            // Input handling
            const keys = {};
            window.addEventListener('keydown', (e) => {
                keys[e.key] = true;
            });
            window.addEventListener('keyup', (e) => {
                keys[e.key] = false;
            });

            // Game update
            function update() {
                // Input processing
                const forward = keys['ArrowUp'] || keys['w'] || keys['W'];
                const backward = keys['ArrowDown'] || keys['s'] || keys['S'];
                const left = keys['ArrowLeft'] || keys['a'] || keys['A'];
                const right = keys['ArrowRight'] || keys['d'] || keys['D'];
                const brake = keys[' '];
                
                // Acceleration
                if (forward) {
                    player.speed = Math.min(player.speed + player.acceleration, player.maxSpeed);
                } else if (backward) {
                    player.speed = Math.max(player.speed - player.acceleration, -player.maxSpeed * 0.5);
                } else {
                    player.speed *= player.friction;
                }
                
                // Braking
                if (brake) {
                    player.speed *= 0.92;
                }
                
                // Turning
                if (left) {
                    player.rotation += player.turnSpeed;
                }
                if (right) {
                    player.rotation -= player.turnSpeed;
                }
                
                // Movement
                player.position.x += Math.sin(player.rotation) * player.speed;
                player.position.z += Math.cos(player.rotation) * player.speed;
                
                // Update car position and rotation
                car.position.copy(player.position);
                car.position.y = 2;
                car.rotation.y = player.rotation;
                
                // Rotate wheels
                wheels.forEach(wheel => {
                    wheel.rotation.x += player.speed * 0.1;
                });
                
                // Boundary check (keep player on the playing field)
                const maxDistance = 300;
                const distance = Math.sqrt(player.position.x ** 2 + player.position.z ** 2);
                if (distance > maxDistance) {
                    const ratio = maxDistance / distance;
                    player.position.x *= ratio;
                    player.position.z *= ratio;
                    player.speed *= 0.7;
                }
                
                // Lap detection (simple version - at origin)
                if (distance < 30 && player.lastCheckpoint !== Math.floor(distance / 5)) {
                    if (player.lastCheckpoint > 5) {
                        player.laps++;
                        document.getElementById('lap').textContent = player.laps;
                    }
                    player.lastCheckpoint = Math.floor(distance / 5);
                }
                
                // Update track distance for lap counting
                player.totalDistance = distance;
                
                // Camera follow
                const cameraDistance = 15;
                const cameraHeight = 8;
                const targetX = player.position.x - Math.sin(player.rotation) * cameraDistance;
                const targetZ = player.position.z - Math.cos(player.rotation) * cameraDistance;
                
                camera.position.x += (targetX - camera.position.x) * 0.1;
                camera.position.z += (targetZ - camera.position.z) * 0.1;
                camera.position.y = player.position.y + cameraHeight;
                
                camera.lookAt(car.position.x, car.position.y + 2, car.position.z);
                
                // Update UI
                document.getElementById('speed').textContent = Math.round(Math.abs(player.speed) * 200);
            }

            // Render loop
            function animate() {
                requestAnimationFrame(animate);
                update();
                renderer.render(scene, camera);
            }

            // Handle window resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Start game
            animate();
        });
    </script>
</body>
</html>
